[API_KEYS]
# 优先使用环境变量 DASHSCOPE_API_KEY；本地可临时填写；勿将真实密钥提交到 Git
ali_api_key = REDACTED
ali_base_url = https://dashscope.aliyuncs.com/compatible-mode/v1

# B 轨：主路径 hybrid（TF-IDF 路由 + LLM）；hash_only 为基线。可被环境变量 MOSAIC_BUILD_MODE 覆盖；CLI「--hash」强制 hash_only
[BUILD]
mode = hybrid

# 构图结束后的双图增强（E_A=BGE 语义边；E_P=可选 LLM 先决弧）。见 docs/optimization.md §5 B-2、src/graph/dual/edge_construction.py
[EDGE]
semantic_a_enabled = true
semantic_min_similarity = 0.55
semantic_max_pairs = 2000
semantic_min_text_len = 24
prerequisite_llm_enabled = false
prerequisite_min_similarity = 0.22
prerequisite_max_pairs = 64
prerequisite_batch_size = 6

# P-0：构图 / 查询 / 评判共用同一对话模型；改 chat_model 即可切换（亦可设 MOSAIC_CHAT_MODEL / MOSAIC_CHAT_MODEL_SPEC）
[LLM]
provider = ali_api
chat_model = qwen3.5-plus

[PATHS]
# 嵌入模型目录：可填绝对路径，或相对于 mosaic 项目根目录的相对路径（推荐绝对路径，避免工作目录变化导致找不到）
embedding_model = embedding_models/all-MiniLM-L6-v2

# P-2：查询时在检索种子实例之外，沿 E_P/E_A（实例 functions + edges 记录）扩展上下文；neighbor_hops=0 关闭
[QUERY]
neighbor_hops = 1
neighbor_max_extra = 16
neighbor_edge_legs = ALL
# 轨 D：TF-IDF 与 BGE 线性融合权重 λ（0=关闭）；可被 MOSAIC_QUERY_BGE_LAMBDA 覆盖
bge_lambda = 0.2
bge_max_encode_instances = 128
# 查询上下文最大字符数（0=不限）；超出时按实例边界截断，优先保留高分实例。可被 MOSAIC_QUERY_MAX_CONTEXT_CHARS 覆盖
max_context_chars = 50000

# E-3：每会话构图摘要 JSONL（每行一条）；留空则仅当设置 MOSAIC_INGEST_JSONL 时写入
[TELEMETRY]
ingest_jsonl =

# 轨 C 占位：static | evolving | memory_only（Runner 读取）；环境变量 MOSAIC_CONTROL_PROFILE
[CONTROL]
profile = static

# NCS 遥测 JSONL；环境变量 MOSAIC_NCS_TRACE_JSONL 优先
[NCS]
trace_jsonl =
